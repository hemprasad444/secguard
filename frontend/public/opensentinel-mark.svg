<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- OpenSentinel mark: concentric octagonal apertures + center pulse.
       Reads as an open eye / aperture / sentinel watch. Designed to be
       distinct from any commercial security-tool branding — no diamond
       glyph, no V-chevron, no warm-gradient fills. Single-stroke, uses
       currentColor so it tints to whatever surface it sits on. -->
  <polygon points="32,6 50,14 58,32 50,50 32,58 14,50 6,32 14,14" />
  <polygon points="32,16 43,21 48,32 43,43 32,48 21,43 16,32 21,21" opacity="0.6" />
  <circle cx="32" cy="32" r="3" fill="currentColor" stroke="none" />
</svg>
